<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lesson Factory - Cerebras x Gemma 4</title>
  <style>
    :root {
      --bg: #0b0f1a;
      --panel: #131a2b;
      --panel-2: #1b2438;
      --border: #263350;
      --text: #e8edf7;
      --muted: #8b98b5;
      --accent: #6ea8fe;
      --accent-2: #9b8cff;
      --good: #4ade80;
      --warn: #fbbf24;
      --bad: #f87171;
      --shadow: 0 8px 30px rgba(0,0,0,.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(1200px 600px at 80% -10%, #1a2236 0%, var(--bg) 60%);
      color: var(--text);
      min-height: 100vh;
    }
    .app { max-width: 1280px; margin: 0 auto; padding: 20px; }
    header.top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; background: var(--panel); border: 1px solid var(--border);
      border-radius: 14px; box-shadow: var(--shadow); margin-bottom: 18px;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand h1 { font-size: 18px; margin: 0; letter-spacing: .2px; }
    .brand .sub { color: var(--muted); font-size: 12px; }
    .pill {
      font-size: 12px; padding: 5px 10px; border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      color: #0b0f1a; font-weight: 700;
    }
    .speed-badge {
      display: flex; flex-direction: column; align-items: flex-end;
    }
    .speed-badge .big { font-size: 22px; font-weight: 800; color: var(--accent); }
    .speed-badge .lbl { font-size: 11px; color: var(--muted); }
    .layout { display: grid; grid-template-columns: 1fr 360px; gap: 18px; }
    @media (max-width: 1000px) { .layout { grid-template-columns: 1fr; } }
    .panel {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px; box-shadow: var(--shadow);
    }
    .panel h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 1px;
      color: var(--muted); margin: 0 0 12px; }
    .stack > * + * { margin-top: 18px; }
    iframe.frame {
      width: 100%; border: 1px solid var(--border); border-radius: 10px;
      background: #fff;
    }
    /* Video: fixed 1280x720 composition scaled to fit a responsive 16:9 box. */
    .video-wrap {
      position: relative; width: 100%; aspect-ratio: 16 / 9;
      overflow: hidden; border: 1px solid var(--border);
      border-radius: 10px; background: #000;
    }
    iframe.video {
      position: absolute; top: 0; left: 0;
      width: 1280px; height: 720px; transform-origin: 0 0; border: 0;
    }
    iframe.applet { width: 100%; height: 560px; }
    /* Video player chrome */
    .player { position: relative; }
    .player-overlay {
      position: absolute; inset: 0; display: grid; place-items: center;
      background: rgba(4,7,15,.32); cursor: pointer; transition: opacity .15s;
      z-index: 3;
    }
    .player-overlay .play-btn {
      width: 70px; height: 70px; border-radius: 50%;
      background: rgba(11,15,26,.7); border: 1px solid rgba(255,255,255,.25);
      display: grid; place-items: center; backdrop-filter: blur(4px);
      box-shadow: 0 8px 30px rgba(0,0,0,.45);
    }
    .player-overlay .play-btn svg { width: 28px; height: 28px; fill: #fff; margin-left: 3px; }
    .player-bar {
      display: flex; align-items: center; gap: 12px; padding: 10px 12px;
      margin-top: 10px; background: var(--panel-2); border: 1px solid var(--border);
      border-radius: 10px;
    }
    .player-bar .icon-btn {
      width: 34px; height: 34px; padding: 0; display: grid; place-items: center;
      border-radius: 8px; flex: none;
    }
    .player-bar .icon-btn svg { width: 16px; height: 16px; fill: #0b0f1a; }
    .player-bar .time {
      font-variant-numeric: tabular-nums; font-size: 12px; color: var(--muted);
      flex: none; min-width: 88px; text-align: right;
    }
    input[type=range].scrub {
      -webkit-appearance: none; appearance: none; flex: 1; height: 6px;
      border-radius: 5px; background: var(--border); cursor: pointer; outline: none;
    }
    input[type=range].scrub::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none; width: 15px; height: 15px;
      border-radius: 50%; background: var(--accent); border: 2px solid #0b0f1a;
      box-shadow: 0 0 0 3px rgba(110,168,254,.25);
    }
    input[type=range].scrub::-moz-range-thumb {
      width: 15px; height: 15px; border-radius: 50%; background: var(--accent);
      border: 2px solid #0b0f1a;
    }
    .exercise {
      background: var(--panel-2); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px; margin-top: 12px;
    }
    .exercise .q { font-size: 14px; line-height: 1.5; }
    textarea, input[type=text] {
      width: 100%; background: #0e1422; color: var(--text);
      border: 1px solid var(--border); border-radius: 8px; padding: 10px;
      font-size: 14px; font-family: inherit; resize: vertical;
    }
    .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    button {
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      color: #0b0f1a; border: 0; border-radius: 9px; padding: 10px 16px;
      font-weight: 700; cursor: pointer; font-size: 14px;
    }
    button.ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
    button:disabled { opacity: .5; cursor: not-allowed; }
    label.file { font-size: 12px; color: var(--muted); cursor: pointer; }
    .timeline-item {
      display: flex; align-items: center; gap: 10px; padding: 8px 0;
      border-bottom: 1px dashed var(--border);
    }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); flex: none; }
    .dot.run { background: var(--warn); animation: pulse 1s infinite; }
    .dot.done { background: var(--good); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .timeline-item .name { flex: 1; font-size: 13px; }
    .timeline-item .ms { font-variant-numeric: tabular-nums; color: var(--accent); font-size: 12px; }
    .bar { height: 5px; background: var(--accent); border-radius: 3px; }
    .concept-item { display: flex; align-items: center; gap: 10px; padding: 7px 0; font-size: 13px; }
    .concept-item .idx { width: 20px; height: 20px; border-radius: 50%; display: grid; place-items: center;
      font-size: 11px; border: 1px solid var(--border); color: var(--muted); flex: none; }
    .concept-item.active .idx { background: var(--accent); color: #0b0f1a; border-color: var(--accent); }
    .concept-item.done .idx { background: var(--good); color: #0b0f1a; border-color: var(--good); }
    .grade-card { border-radius: 12px; padding: 14px; margin-top: 14px; border: 1px solid var(--border); }
    .grade-card.correct { background: rgba(74,222,128,.08); border-color: rgba(74,222,128,.4); }
    .grade-card.incorrect { background: rgba(248,113,113,.08); border-color: rgba(248,113,113,.4); }
    .decision { font-size: 13px; margin-top: 8px; color: var(--muted); }
    .badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 6px; }
    .badge.advance { background: var(--good); color: #06210f; }
    .badge.harder { background: var(--warn); color: #2a1c00; }
    .badge.remediate { background: var(--accent); color: #061425; }
    .meter { height: 8px; background: #0e1422; border-radius: 5px; overflow: hidden; margin-top: 4px; }
    .meter > div { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); }
    .center { display: grid; place-items: center; min-height: 60vh; }
    .start-card { width: 420px; max-width: 92vw; text-align: left; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 18px 0; color: var(--muted); font-size: 12px; }
    .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }
    .dropzone {
      display: block; text-align: center; cursor: pointer;
      border: 1px dashed var(--border); border-radius: 12px; padding: 18px 14px;
      background: var(--panel-2); transition: border-color .15s, background .15s;
    }
    .dropzone:hover { border-color: var(--accent); background: #1d2740; }
    .dropzone .dz-icon { font-size: 26px; margin-bottom: 6px; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
    .muted { color: var(--muted); font-size: 12px; }
    .loading-bar { height: 3px; background: linear-gradient(90deg, transparent, var(--accent), transparent);
      background-size: 200% 100%; animation: slide 1.1s linear infinite; border-radius: 3px; }
    @keyframes slide { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    /* Speed race */
    .overlay {
      position: fixed; inset: 0; background: rgba(4,7,15,.72); z-index: 50;
      display: grid; place-items: center; padding: 20px;
    }
    .race-modal { width: 960px; max-width: 96vw; }
    .race-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .race-sub { color: var(--muted); font-size: 12px; margin-bottom: 16px; }
    .race-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 760px) { .race-cols { grid-template-columns: 1fr; } }
    .race-out {
      height: 230px; overflow: auto; margin-top: 10px; font-size: 13px; line-height: 1.5;
      white-space: pre-wrap; word-break: break-word; background: #0e1422;
      border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: var(--text);
    }
    .caret { color: var(--accent); animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    .lane { margin: 0; }
    .lane-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
    .lane-name { font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .lane-name .chip { font-size: 10px; padding: 2px 7px; border-radius: 999px; background: var(--panel-2); color: var(--muted); font-weight: 600; }
    .lane.cerebras .lane-name { color: var(--accent); }
    .lane.gemini .lane-name { color: var(--accent-2); }
    .lane-stats { font-variant-numeric: tabular-nums; font-size: 12px; color: var(--muted); }
    .track { height: 16px; background: #0e1422; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
    .fill { height: 100%; border-radius: 8px; transition: width .08s linear; }
    .lane.cerebras .fill { background: linear-gradient(90deg, #3b82f6, var(--accent)); }
    .lane.gemini .fill { background: linear-gradient(90deg, #7c5cff, var(--accent-2)); }
    .winner { display:inline-block; margin-left: 8px; font-size: 11px; font-weight: 800; color: var(--good); }
    .speedup-banner {
      margin-top: 18px; text-align: center; font-size: 20px; font-weight: 800;
      color: var(--accent); padding: 12px; border: 1px solid rgba(110,168,254,.4);
      border-radius: 12px; background: rgba(110,168,254,.08);
    }
    .icon-link {
      background: transparent; color: var(--text); border: 1px solid var(--border);
      border-radius: 9px; padding: 8px 14px; font-weight: 700; cursor: pointer; font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import React, { useState, useRef, useEffect } from "https://esm.sh/react@18.3.1";
    import { createRoot } from "https://esm.sh/react-dom@18.3.1/client";
    import htm from "https://esm.sh/htm@3.1.1";

    const html = htm.bind(React.createElement);
    const API = "";

    async function streamSSE(url, opts, onEvent) {
      const res = await fetch(url, opts);
      if (!res.ok || !res.body) throw new Error("Request failed: " + res.status);
      const reader = res.body.getReader();
      const dec = new TextDecoder();
      let buf = "";
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true }).replace(/\r\n/g, "\n");
        let idx;
        while ((idx = buf.indexOf("\n\n")) >= 0) {
          const chunk = buf.slice(0, idx);
          buf = buf.slice(idx + 2);
          const dataLine = chunk.split("\n").find((l) => l.startsWith("data:"));
          if (dataLine) {
            try { onEvent(JSON.parse(dataLine.slice(5).trim())); } catch (e) {}
          }
        }
      }
    }

    function SpeedBadge({ totalMs }) {
      return html`
        <div class="speed-badge">
          <div class="big">${(totalMs / 1000).toFixed(2)}s</div>
          <div class="lbl">model time this lesson · Cerebras</div>
        </div>`;
    }

    // Estimated max tokens for the race prompt (RACE_MAX_TOKENS≈700 -> ~175 tok).
    const RACE_TOK_MAX = 180;

    function RaceLane({ provider, d, text, done }) {
      const isCb = provider === "cerebras";
      const pct = Math.min(100, ((d.tokens || 0) / RACE_TOK_MAX) * 100);
      const unconfigured = d.status === "unconfigured";
      const errored = d.status === "error";
      const streaming = d.status === "progress" || d.status === "start";
      const outRef = useRef(null);

      useEffect(() => {
        const el = outRef.current;
        if (el) el.scrollTop = el.scrollHeight;
      }, [text]);

      return html`
        <div class=${"lane " + provider}>
          <div class="lane-top">
            <div class="lane-name">
              ${isCb ? "Cerebras" : "Gemini (GPU)"}
              <span class="chip">${d.model || (isCb ? "gemma-4-31b" : "gemma-4-31b-it")}</span>
              ${done && html`<span class="winner">★ winner</span>`}
            </div>
          </div>
          <div class="lane-stats" style=${{ marginBottom: "6px" }}>
            ${unconfigured
              ? "set GEMINI_API_KEY in .env"
              : errored
              ? "error: " + (d.message || "failed")
              : html`<strong style=${{ color: "var(--text)" }}>${d.tps || 0}</strong> tok/s · TTFT ${
                  d.ttft_s != null ? d.ttft_s.toFixed(2) : "–"
                }s · ${d.elapsed_s != null ? d.elapsed_s.toFixed(2) : "0.00"}s`}
          </div>
          <div class="track"><div class="fill" style=${{ width: (unconfigured || errored ? 0 : pct) + "%" }}></div></div>
          <div class="race-out" ref=${outRef}>
            ${text || (unconfigured ? "" : html`<span class="muted">…</span>`)}
            ${streaming && text && html`<span class="caret">▍</span>`}
          </div>
        </div>`;
    }

    function RacePanel({ onClose }) {
      const [topic, setTopic] = useState("projectile motion");
      const [running, setRunning] = useState(false);
      const [lanes, setLanes] = useState({});
      const [outputs, setOutputs] = useState({ cerebras: "", gemini: "" });
      const [speedup, setSpeedup] = useState(null);
      const [done, setDone] = useState(false);

      async function race() {
        setRunning(true);
        setDone(false);
        setSpeedup(null);
        setLanes({});
        setOutputs({ cerebras: "", gemini: "" });
        try {
          await streamSSE(`${API}/race?topic=${encodeURIComponent(topic)}`, { method: "POST" }, (ev) => {
            if (ev.type === "race") {
              setLanes((prev) => ({ ...prev, [ev.provider]: { ...prev[ev.provider], ...ev } }));
              if (ev.status === "start") {
                setOutputs((prev) => ({ ...prev, [ev.provider]: "" }));
              } else if (ev.delta) {
                setOutputs((prev) => ({ ...prev, [ev.provider]: (prev[ev.provider] || "") + ev.delta }));
              }
            } else if (ev.type === "race_summary") {
              setSpeedup(ev.speedup_total);
              setDone(true);
            }
          });
        } catch (e) {
          alert("Race failed: " + e.message);
        } finally {
          setRunning(false);
        }
      }

      const order = ["cerebras", "gemini"];
      const winner =
        done && lanes.cerebras?.status === "done" && lanes.gemini?.status === "done"
          ? lanes.cerebras.elapsed_s <= lanes.gemini.elapsed_s
            ? "cerebras"
            : "gemini"
          : null;

      return html`
        <div class="overlay" onClick=${(e) => e.target.classList.contains("overlay") && onClose()}>
          <div class="panel race-modal">
            <div class="race-head">
              <h2 style=${{ margin: 0, textTransform: "none", fontSize: "18px", color: "var(--text)" }}>
                ⚡ Same model, different hardware
              </h2>
              <button class="icon-link" onClick=${onClose}>Close</button>
            </div>
            <div class="race-sub">
              Apples-to-apples: <strong>Gemma 4 31B</strong> on Cerebras vs the same weights on Google's
              Gemini API (GPU). Identical prompt, streamed live.
            </div>

            <div class="row" style=${{ marginBottom: "12px" }}>
              <input
                type="text"
                value=${topic}
                onInput=${(e) => setTopic(e.target.value)}
                placeholder="Topic to explain…"
                style=${{ flex: 1 }}
              />
              <button onClick=${race} disabled=${running}>${running ? "Racing…" : "Race ▶"}</button>
            </div>

            <div class="race-cols">
              ${order.map(
                (p) => html`<${RaceLane}
                  key=${p}
                  provider=${p}
                  d=${lanes[p] || {}}
                  text=${outputs[p] || ""}
                  done=${winner === p}
                />`
              )}
            </div>

            ${speedup != null &&
            html`<div class="speedup-banner">Cerebras is ${speedup}× faster (end-to-end)</div>`}
          </div>
        </div>`;
    }

    function fmtTime(s) {
      if (!isFinite(s) || s < 0) s = 0;
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return `${m}:${sec.toString().padStart(2, "0")}`;
    }

    const PlayIcon = () => html`<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z" /></svg>`;
    const PauseIcon = () => html`<svg viewBox="0 0 24 24"><path d="M6 5h4v14H6zm8 0h4v14h-4z" /></svg>`;
    const ReplayIcon = () =>
      html`<svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7a5 5 0 11-5 5H5a7 7 0 107-7z" /></svg>`;

    function VideoFrame({ html: videoHtml }) {
      const wrapRef = useRef(null);
      const frameRef = useRef(null);
      const [playing, setPlaying] = useState(false);
      const [t, setT] = useState(0);
      const [duration, setDuration] = useState(0);
      const [hasPlayer, setHasPlayer] = useState(true);
      const [seeking, setSeeking] = useState(false);
      // Re-mount key lets Replay rebuild the iframe when there's no player runtime.
      const [mountKey, setMountKey] = useState(0);

      // Scale the fixed 1280x720 composition to fit the responsive 16:9 box.
      useEffect(() => {
        const wrap = wrapRef.current;
        const frame = frameRef.current;
        if (!wrap || !frame) return;
        const fit = () => {
          const scale = wrap.clientWidth / 1280;
          frame.style.transform = `scale(${scale})`;
        };
        fit();
        const ro = new ResizeObserver(fit);
        ro.observe(wrap);
        return () => ro.disconnect();
      }, [videoHtml, mountKey]);

      // Reset state whenever a new composition (or re-mount) loads.
      useEffect(() => {
        setPlaying(false);
        setT(0);
        setDuration(0);
        setHasPlayer(true);
      }, [videoHtml, mountKey]);

      // Listen only to messages from this iframe's contentWindow.
      useEffect(() => {
        function onMsg(ev) {
          const frame = frameRef.current;
          if (!frame || ev.source !== frame.contentWindow) return;
          const m = ev.data;
          if (!m || m.source !== "player") return;
          if (m.type === "ready") {
            setDuration(m.duration || 0);
            setHasPlayer(true);
            setPlaying(true);
          } else if (m.type === "time") {
            if (typeof m.duration === "number") setDuration(m.duration);
            if (!seeking) setT(m.t || 0);
          } else if (m.type === "ended") {
            setPlaying(false);
          } else if (m.type === "noplayer") {
            setHasPlayer(false);
          }
        }
        window.addEventListener("message", onMsg);
        return () => window.removeEventListener("message", onMsg);
      }, [seeking]);

      function send(action, time) {
        const frame = frameRef.current;
        if (!frame || !frame.contentWindow) return;
        frame.contentWindow.postMessage({ source: "host", action, time }, "*");
      }

      function toggle() {
        if (playing) {
          send("pause");
          setPlaying(false);
        } else {
          send("play");
          setPlaying(true);
        }
      }

      function onScrub(e) {
        const v = parseFloat(e.target.value);
        setT(v);
        send("seek", v);
      }

      function replay() {
        if (hasPlayer) {
          send("restart");
          setPlaying(true);
        } else {
          setMountKey((k) => k + 1); // rebuild iframe to re-run any auto animation
        }
      }

      const pct = duration > 0 ? (t / duration) * 100 : 0;

      return html`
        <div class="player">
          <div class="video-wrap" ref=${wrapRef}>
            <iframe
              class="video"
              key=${mountKey}
              ref=${frameRef}
              srcdoc=${videoHtml}
              sandbox="allow-scripts"
            ></iframe>
            ${hasPlayer && !playing &&
            html`<div class="player-overlay" onClick=${toggle}>
              <div class="play-btn"><${PlayIcon} /></div>
            </div>`}
          </div>
          <div class="player-bar">
            ${hasPlayer &&
            html`<button class="icon-btn" onClick=${toggle} title=${playing ? "Pause" : "Play"}>
              ${playing ? html`<${PauseIcon} />` : html`<${PlayIcon} />`}
            </button>`}
            ${hasPlayer &&
            html`<input
              class="scrub"
              type="range"
              min="0"
              max=${duration || 0}
              step="0.05"
              value=${t}
              style=${{ background: `linear-gradient(90deg, var(--accent) ${pct}%, var(--border) ${pct}%)` }}
              onMouseDown=${() => setSeeking(true)}
              onMouseUp=${() => setSeeking(false)}
              onInput=${onScrub}
            />`}
            ${hasPlayer
              ? html`<div class="time">${fmtTime(t)} / ${fmtTime(duration)}</div>`
              : html`<div class="time" style=${{ flex: 1, textAlign: "left", minWidth: 0 }}>Static composition</div>`}
            <button class="icon-btn" onClick=${replay} title="Replay"><${ReplayIcon} /></button>
          </div>
        </div>`;
    }

    function AgentTimeline({ events }) {
      const maxT = Math.max(0.001, ...events.map((e) => e.total_s || 0));
      const total = events.reduce((s, e) => s + (e.total_s || 0), 0);
      return html`
        <div class="panel">
          <div class="row" style=${{ justifyContent: "space-between", alignItems: "baseline" }}>
            <h2 style=${{ margin: 0 }}>Agent Swarm (live)</h2>
            <span style=${{ color: "var(--accent)", fontWeight: 800, fontVariantNumeric: "tabular-nums" }}>
              ${total.toFixed(2)}s
            </span>
          </div>
          <div class="muted" style=${{ marginBottom: "10px" }}>total model time on Cerebras</div>
          ${events.length === 0 && html`<div class="muted">Waiting for generation…</div>`}
          ${events.map(
            (e, i) => html`
              <div class="timeline-item" key=${i}>
                <div class=${"dot " + (e.status === "done" ? "done" : "run")}></div>
                <div class="name">
                  ${e.agent}
                  ${e.note ? html`<span class="muted"> (${e.note})</span>` : ""}
                  ${e.total_s
                    ? html`<div class="bar" style=${{ width: (100 * e.total_s) / maxT + "%", marginTop: "4px" }}></div>`
                    : html`<div class="loading-bar" style=${{ marginTop: "6px" }}></div>`}
                </div>
                <div class="ms">${e.total_s ? e.total_s.toFixed(2) + "s" : "…"}</div>
              </div>`
          )}
        </div>`;
    }

    function ProgressTracker({ outline }) {
      if (!outline) return null;
      return html`
        <div class="panel">
          <h2>${outline.chapter}</h2>
          ${outline.concepts.map(
            (c) => html`
              <div
                key=${c.order}
                class=${"concept-item " +
                  (c.order < outline.current_index ? "done" : c.order === outline.current_index ? "active" : "")}
              >
                <div class="idx">${c.order < outline.current_index ? "✓" : c.order + 1}</div>
                <div>${c.title}</div>
              </div>`
          )}
        </div>`;
    }

    function GradeCard({ grade, decision }) {
      if (!grade) return null;
      return html`
        <div class=${"grade-card " + (grade.correct ? "correct" : "incorrect")}>
          <div class="row" style=${{ justifyContent: "space-between" }}>
            <strong>${grade.correct ? "Correct!" : "Not quite"}</strong>
            <span class=${"badge " + decision.action}>${decision.action.toUpperCase()}</span>
          </div>
          <div style=${{ marginTop: "8px", fontSize: "14px" }}>${grade.feedback}</div>
          ${grade.misconception &&
          html`<div class="muted" style=${{ marginTop: "6px" }}>Misconception: ${grade.misconception}</div>`}
          <div class="row" style=${{ marginTop: "10px", gap: "18px" }}>
            <div style=${{ flex: 1 }}>
              <div class="muted">Score</div>
              <div class="meter"><div style=${{ width: grade.score * 100 + "%" }}></div></div>
            </div>
            <div style=${{ flex: 1 }}>
              <div class="muted">Mastery</div>
              <div class="meter"><div style=${{ width: grade.mastery * 100 + "%" }}></div></div>
            </div>
          </div>
          <div class="decision">${decision.rationale}</div>
        </div>`;
    }

    function LessonView({ session, outline, setOutline }) {
      const [events, setEvents] = useState([]);
      const [lesson, setLesson] = useState(null);
      const [answer, setAnswer] = useState("");
      const [imageFile, setImageFile] = useState(null);
      const [grade, setGrade] = useState(null);
      const [decision, setDecision] = useState(null);
      const [busy, setBusy] = useState(false);
      const [grading, setGrading] = useState(false);

      const totalMs = events.reduce((s, e) => s + (e.total_s ? e.total_s * 1000 : 0), 0);

      async function generate() {
        setBusy(true);
        setEvents([]);
        setLesson(null);
        setGrade(null);
        setDecision(null);
        setAnswer("");
        setImageFile(null);
        try {
          await streamSSE(`${API}/course/${session}/lesson/generate`, { method: "POST" }, (ev) => {
            if (ev.type === "agent") {
              setEvents((prev) => {
                // collapse start+done into the latest entry per agent occurrence
                if (ev.status === "done") {
                  const idx = [...prev].reverse().findIndex((p) => p.agent === ev.agent && !p.total_s);
                  if (idx >= 0) {
                    const real = prev.length - 1 - idx;
                    const copy = prev.slice();
                    copy[real] = { ...copy[real], ...ev };
                    return copy;
                  }
                }
                return [...prev, ev];
              });
            } else if (ev.type === "lesson") {
              setLesson(ev);
            } else if (ev.type === "error") {
              alert("Generation error: " + ev.message);
            }
          });
        } finally {
          setBusy(false);
        }
      }

      useEffect(() => {
        generate();
      }, []);

      async function advanceLesson() {
        const res = await fetch(`${API}/course/${session}/advance`, { method: "POST" });
        const o = await res.json();
        setOutline(o);
        if (!o.finished) generate();
      }

      async function submit() {
        if (!lesson) return;
        setGrading(true);
        const fd = new FormData();
        fd.append("answer_text", answer);
        if (imageFile) fd.append("image", imageFile);
        try {
          await streamSSE(`${API}/course/${session}/lesson/submit`, { method: "POST", body: fd }, (ev) => {
            if (ev.type === "agent") {
              setEvents((prev) => [...prev, ev]);
            } else if (ev.type === "result") {
              setGrade(ev.grade);
              setDecision(ev.decision);
              setOutline((o) => ({ ...o, current_index: ev.next_index, finished: ev.finished }));
            } else if (ev.type === "error") {
              alert("Grading error: " + ev.message);
            }
          });
        } finally {
          setGrading(false);
        }
      }

      return html`
        <div class="layout">
          <div class="stack">
            <div class="panel">
              <h2>Explainer Video ${lesson && html`· ${lesson.concept.title}`}</h2>
              ${busy && !lesson && html`<div class="loading-bar"></div>`}
              ${lesson
                ? html`<${VideoFrame} html=${lesson.video_html} />`
                : html`<div class="muted" style=${{ padding: "40px 0", textAlign: "center" }}>Generating your lesson…</div>`}
            </div>

            ${lesson &&
            html`
              <div class="panel">
                <h2>Interactive Exercise</h2>
                <iframe class="frame applet" srcdoc=${lesson.applet_html} sandbox="allow-scripts"></iframe>
                ${!lesson.exercise &&
                html`
                  <div class="row" style=${{ marginTop: "14px" }}>
                    ${outline.finished
                      ? html`<div class="muted">Course complete · you've finished every concept.</div>`
                      : html`<button onClick=${advanceLesson} disabled=${busy}>Next lesson →</button>`}
                  </div>
                `}
                ${lesson.exercise &&
                html`
                  <div class="exercise">
                    <div class="muted">Problem · difficulty ${lesson.exercise.difficulty}</div>
                    <div class="q">${lesson.exercise.problem}</div>
                  </div>
                  <div class="field" style=${{ marginTop: "12px" }}>
                    <label>Your answer</label>
                    <textarea
                      rows="3"
                      value=${answer}
                      onInput=${(e) => setAnswer(e.target.value)}
                      placeholder="Type your reasoning and final answer…"
                    ></textarea>
                  </div>
                  <div class="row">
                    <button onClick=${submit} disabled=${grading || (!answer && !imageFile)}>
                      ${grading ? "Grading…" : "Submit answer"}
                    </button>
                    <label class="file">
                      📎 ${imageFile ? imageFile.name : "attach a photo of your work"}
                      <input
                        type="file"
                        accept="image/*"
                        style=${{ display: "none" }}
                        onChange=${(e) => setImageFile(e.target.files[0] || null)}
                      />
                    </label>
                  </div>
                  <${GradeCard} grade=${grade} decision=${decision} />
                  ${grade &&
                  html`<div class="row" style=${{ marginTop: "12px" }}>
                    <button onClick=${generate} disabled=${busy}>
                      ${outline.finished ? "Course complete · regenerate" : decision.action === "advance" ? "Next lesson →" : "Try the new version →"}
                    </button>
                  </div>`}
                `}
              </div>
            `}
          </div>

          <div class="stack">
            <${ProgressTracker} outline=${outline} />
            <${AgentTimeline} events=${events} />
          </div>
        </div>`;
    }

    function App() {
      const [outline, setOutline] = useState(null);
      const [name, setName] = useState("Maya");
      const [grade, setGrade] = useState("8th grade");
      const [starting, setStarting] = useState(false);
      const [pdfFile, setPdfFile] = useState(null);
      const [pdfBusy, setPdfBusy] = useState(false);
      const [showRace, setShowRace] = useState(false);

      async function start() {
        setStarting(true);
        try {
          const res = await fetch(`${API}/course/start`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, grade_level: grade }),
          });
          setOutline(await res.json());
        } finally {
          setStarting(false);
        }
      }

      async function startFromPdf() {
        if (!pdfFile) return;
        setPdfBusy(true);
        try {
          const fd = new FormData();
          fd.append("pdf", pdfFile);
          fd.append("name", name);
          fd.append("grade_level", grade);
          const res = await fetch(`${API}/course/start_from_pdf`, { method: "POST", body: fd });
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            alert("Could not build a course from that PDF: " + (err.detail || res.status));
            return;
          }
          setOutline(await res.json());
        } finally {
          setPdfBusy(false);
        }
      }

      return html`
        <div class="app">
          <header class="top">
            <div class="brand">
              <span class="pill">Lesson Factory</span>
              <div>
                <h1>Personalized Tutor</h1>
                <div class="sub">Multi-agent · Cerebras ultra-fast inference · Gemma 4 31B</div>
              </div>
            </div>
            <button class="icon-link" onClick=${() => setShowRace(true)}>⚡ Speed race</button>
          </header>

          ${showRace && html`<${RacePanel} onClose=${() => setShowRace(false)} />`}

          ${!outline
            ? html`
                <div class="center">
                  <div class="panel start-card">
                    <h2>Start a course</h2>
                    <div class="field">
                      <label>Student name</label>
                      <input type="text" value=${name} onInput=${(e) => setName(e.target.value)} />
                    </div>
                    <div class="field">
                      <label>Grade level</label>
                      <input type="text" value=${grade} onInput=${(e) => setGrade(e.target.value)} />
                    </div>
                    <button onClick=${start} disabled=${starting || pdfBusy}>
                      ${starting ? "Loading course…" : "Start physics course"}
                    </button>
                    <div class="muted" style=${{ marginTop: "10px" }}>
                      Seeded from OpenStax Physics (CC BY 4.0) + PhysicsEval.
                    </div>

                    <div class="divider"><span>or upload your own</span></div>

                    <label class="dropzone">
                      <input
                        type="file"
                        accept="application/pdf,.pdf"
                        style=${{ display: "none" }}
                        onChange=${(e) => setPdfFile(e.target.files[0] || null)}
                      />
                      <div class="dz-icon">📄</div>
                      <div>${pdfFile ? pdfFile.name : "Choose a PDF lesson or short paper"}</div>
                      <div class="muted">Any subject · we'll turn it into video lessons</div>
                    </label>
                    <button
                      class=${pdfFile ? "" : "ghost"}
                      style=${{ marginTop: "12px", width: "100%" }}
                      onClick=${startFromPdf}
                      disabled=${!pdfFile || pdfBusy || starting}
                    >
                      ${pdfBusy ? "Reading & building course…" : "Generate from PDF"}
                    </button>
                    <div class="muted" style=${{ marginTop: "8px" }}>
                      Text-based PDFs only (scanned/image PDFs aren't supported yet).
                    </div>
                  </div>
                </div>`
            : html`<${LessonView} session=${outline.session_id} outline=${outline} setOutline=${setOutline} />`}
        </div>`;
    }

    createRoot(document.getElementById("root")).render(html`<${App} />`);
  </script>
</body>
</html>
